# Firmware boot script for the Orange Pi 6 (CIX P1 / sky1)
#
# This script expects the following Grub2 modules to be compiled
# into the grub binary (BOOTAA64.EFI):
#
# boot linux squash4 ext2 fat part_gpt part_msdos normal efi_gop loadenv echo
# test true search configfile regexp probe
#
# GRUB is loaded from the ESP by the board's on-board UEFI firmware, so
# $root points at the ESP. The rootfs slots are partitions 2 and 3 on the
# same disk. The kernel is stored inside each slot's squashfs at /boot/Image.
#
# The rootfs PARTUUID is probed at boot from the disk GRUB was loaded from,
# so the same image boots from microSD, NVMe, USB or eMMC — including when
# several of them hold a Nerves install at once (each medium must be burned
# with its own partition GUIDs; see README). Whichever disk the UEFI boot
# order picks supplies both the kernel and the rootfs.

# Load the environment for the A/B slot selection
load_env

# Derive the disk grub was loaded from (e.g. "hd0,gpt1" -> "hd0") so that
# booting still works if the UEFI enumerates other disks first.
regexp --set=nerves_disk '^\(?([^,]+)' "$root"
if [ -z "$nerves_disk" ]; then
    set nerves_disk=hd0
fi

# Kernel command line, taken from the vendor (orangepi-build) image's working
# grub entry. acpi=force selects the ACPI hardware description (no DTB) and
# efi=noruntime is required on this firmware.
set nerves_cmdline="console=ttyAMA2,115200 efi=noruntime earlycon=pl011,0x040d0000 arm-smmu-v3.disable_bypass=0 cma=640M acpi=force loglevel=4 pcie_aspm=off rootfstype=squashfs rootwait ro"

# Boot A or B depending on which one is active
if [ "$boot" = "1" ]; then
    probe --set=nerves_root_uuid --part-uuid ($nerves_disk,gpt3)
    echo "Booting slot B (root PARTUUID=$nerves_root_uuid)..."
    linux ($nerves_disk,gpt3)/boot/Image root=PARTUUID=$nerves_root_uuid $nerves_cmdline
else
    probe --set=nerves_root_uuid --part-uuid ($nerves_disk,gpt2)
    echo "Booting slot A (root PARTUUID=$nerves_root_uuid)..."
    linux ($nerves_disk,gpt2)/boot/Image root=PARTUUID=$nerves_root_uuid $nerves_cmdline
fi

# Boot!!!
boot
