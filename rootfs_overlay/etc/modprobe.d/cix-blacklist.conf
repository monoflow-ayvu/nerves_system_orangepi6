# Keep the open-source DRM drivers from binding the CIX hardware — the
# proprietary mali_kbase (GPU) and the in-tree CIX DPU own the display/GPU.
# Mirrors the vendor cix-env blacklist.
blacklist panthor
blacklist panfrost
blacklist lima
blacklist komeda
blacklist mali-dp
blacklist mali_dp
blacklist hdlcd
# amvx (VPU) is loaded explicitly in dependency order by cix-coldplug.sh,
# not auto-probed.
blacklist amvx
